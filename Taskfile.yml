version: '3'

tasks:
  default:
    desc: "Muestra las tareas disponibles"
    cmds:
      - task --list-all

  build:
    desc: "Compila el CLI de tarhiata-ops"
    cmds:
      - go build -o bin/tarhiata cmd/tarhiata/main.go
    
  run:
    desc: "Ejecuta el CLI en modo desarrollo"
    cmds:
      - go run cmd/tarhiata/main.go {{.CLI_ARGS}}

  test:
    desc: "Ejecuta todas las pruebas (Table-Driven Tests)"
    cmds:
      - go test -v ./...

  simulator:
    desc: "Levanta un VPS local (Docker) para probar el CLI sin gastar en la nube"
    cmds:
      - ./scripts/vps_simulator.sh
